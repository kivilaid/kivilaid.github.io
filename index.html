    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-300: #86efac;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
            --green-950: #052e16;
            --gold: #d4a853;
            --gold-dim: #b8943f;
        }

        [data-theme="dark"] {
            --bg-primary: #0A0F0D;
            --bg-secondary: #111A14;
            --bg-card: #141F18;
            --bg-card-hover: #1A2A1E;
            --text-primary: #f0fdf4;
            --text-secondary: #a7c4a7;
            --text-muted: #6b8f6b;
            --accent: var(--green-400);
            --accent-dim: var(--green-600);
            --border: rgba(34, 197, 94, 0.15);
            --border-hover: rgba(34, 197, 94, 0.3);
            --glow: rgba(34, 197, 94, 0.05);
        }

        [data-theme="light"] {
            --bg-primary: #fafdf8;
            --bg-secondary: #f0f7ed;
            --bg-card: #ffffff;
            --bg-card-hover: #f5faf2;
            --text-primary: #0a1f0a;
            --text-secondary: #3d5e3d;
            --text-muted: #6b8f6b;
            --accent: var(--green-700);
            --accent-dim: var(--green-500);
            --border: rgba(21, 128, 61, 0.15);
            --border-hover: rgba(21, 128, 61, 0.3);
            --glow: rgba(21, 128, 61, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-primary);
        }

        nav .nav-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        nav button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        nav button.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* ===== SECTIONS ===== */
        section {
            padding: 0 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-top: 5rem;
        }

        .hero-eyebrow {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-description {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* ===== DIVIDER ===== */
        .divider {
            width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 6rem 0;
            opacity: 0.5;
        }

        /* ===== ABOUT ===== */
        .about p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.9;
            margin-bottom: 1.5rem;
        }

        .about p strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ===== ABOUT PHOTO ===== */
        .about-hero {
            margin-bottom: 2.5rem;
        }

        .about-photo {
            width: 180px;
            height: 180px;
            object-fit: cover;
            object-position: center 15%;
            border-radius: 50%;
            border: 2px solid var(--border);
            filter: grayscale(30%);
            transition: filter 0.4s ease, border-color 0.4s ease;
        }

        .about-photo:hover {
            filter: grayscale(0%);
            border-color: var(--accent);
        }

        /* ===== SERVICES ===== */
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 3rem;
            line-height: 1.3;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .service-item {
            background: var(--bg-card);
            padding: 2.5rem;
            transition: background-color 0.3s ease;
        }

        .service-item:hover {
            background: var(--bg-card-hover);
        }

        .service-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .service-item p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ===== TRACK RECORD ===== */
        .track-record-list {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .record-item {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .record-period {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            padding-top: 0.25rem;
        }

        .record-content h3 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .record-content .role {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .record-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;

            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);

            margin-top: 2.5rem;

            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;

            transform: translateY(-1px);
        }

        /* ===== FOOTER ===== */

            text-align: center;

                gap: 0.5rem;
            }

                border-radius: 8px;
            }

                padding: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            nav .logo {
                font-size: 0.95rem;
            }

            .hero {
                padding-top: 4rem;
            }
        }

        /* ===== ANIMATIONS ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

    <script>
        // ===== LANGUAGE =====
        let currentLang = 'en';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'et' : 'en';
            document.getElementById('lang-toggle').textContent = currentLang === 'en' ? 'ET' : 'EN';
            document.documentElement.lang = currentLang;

            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute(`data-${currentLang}`);
                if (text) el.innerHTML = text;
            });
        }

        // ===== THEME =====
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀' : '☾';
            localStorage.setItem('theme', next);
        }

        // Restore saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-toggle').textContent = savedTheme === 'dark' ? '☀' : '☾';
        }

        // ===== SCROLL ANIMATIONS =====
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // ===== INIT LANGUAGE =====
        document.querySelectorAll('[data-en]').forEach(el => {
            const text = el.getAttribute('data-en');
            if (text) el.innerHTML = text;
        });
    </script>
</body>
</html>
